version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - rm -rf .next
        - pnpm install --config.node-linker=hoisted
    build:
      commands:
        - pnpm run build
        - find .next -iname "*.map" -delete
        - node scripts/desymlink-standalone.js
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths: []