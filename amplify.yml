version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm run build
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
        - find .next -maxdepth 1 -mindepth 1 ! -name standalone ! -name required-server-files.json -exec rm -rf {} +
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*