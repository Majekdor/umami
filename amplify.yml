version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf .next
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
        - find .next -iname "*.map" -delete
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths: []
