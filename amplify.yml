version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm run build
        - cp -r public .next/public
  artifacts:
    baseDirectory: .next
    files:
      - required-server-files.json
      - standalone/**/*
      - static/**/*
      - public/**/*
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*