version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm run build
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
        - cp .next/required-server-files.json .next/standalone/required-server-files.json
  artifacts:
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*