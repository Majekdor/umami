version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm run build
        - find .next -iname "*.map" -delete
        - echo "=== .next breakdown ===" && du -sh .next/* | sort -rh
        - echo "=== standalone breakdown ===" && du -sh .next/standalone/* | sort -rh
        - echo "=== swc/native binaries ===" && find .next/standalone -iname "*swc*" -o -iname "*.node" | xargs du -ch 2>/dev/null | tail -5
        - echo "=== total ===" && du -sh .next
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*